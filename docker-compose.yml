services:
  postgres:
    image: postgres:16-alpine
    container_name: hubaiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hubaiq
      POSTGRES_USER: hubaiq
      POSTGRES_PASSWORD: hubaiq
    ports:
      - "5432:5432"
    volumes:
      - hubaiq_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hubaiq -d hubaiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-postgres:
    image: postgres:16-alpine
    container_name: hubaiq-evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution123
    volumes:
      - hubaiq_evolution_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-redis:
    image: redis:7-alpine
    container_name: hubaiq-evolution-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - hubaiq_evolution_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: hubaiq-evolution-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy
    ports:
      - "8081:8080"
    volumes:
      - hubaiq_evolution_instances:/evolution/instances
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: http://localhost:8081
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-hubaiq-local-evolution-key}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: true
      DATABASE_ENABLED: true
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution123@evolution-postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: hubaiq_evolution
      DATABASE_SAVE_DATA_INSTANCE: true
      DATABASE_SAVE_DATA_NEW_MESSAGE: true
      DATABASE_SAVE_MESSAGE_UPDATE: true
      DATABASE_SAVE_DATA_CONTACTS: true
      DATABASE_SAVE_DATA_CHATS: true
      DATABASE_SAVE_DATA_LABELS: true
      DATABASE_SAVE_DATA_HISTORIC: true
      CACHE_REDIS_ENABLED: true
      CACHE_REDIS_URI: redis://evolution-redis:6379/6
      CACHE_REDIS_PREFIX_KEY: hubaiq_evolution
      CACHE_REDIS_SAVE_INSTANCES: false
      CACHE_LOCAL_ENABLED: false
      CONFIG_SESSION_PHONE_CLIENT: HubAiq
      CONFIG_SESSION_PHONE_NAME: Chrome
      CONFIG_SESSION_PHONE_VERSION: 2.3000.1038736825
      BAILEYS_VERSION: 2.3000.1038736825
      QRCODE_LIMIT: 30
      LOG_LEVEL: ERROR,WARN,INFO,WEBHOOKS
      LOG_COLOR: true
      LANGUAGE: pt-BR

volumes:
  hubaiq_postgres_data:
  hubaiq_evolution_postgres_data:
  hubaiq_evolution_redis_data:
  hubaiq_evolution_instances:
